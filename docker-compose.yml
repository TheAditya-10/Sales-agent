services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data

  agent:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    command: ["python", "-m", "agent.listener_agent"]
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend-data:
